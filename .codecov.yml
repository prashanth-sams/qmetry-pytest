coverage:
  status:
    patch: false
    project:
      default:
        target: 0.0
        threshold: 60%
    default_rules:
      flag_coverage_not_uploaded_behavior: include
  precision: 3
  range: "50...100"
  round: down

comment:
  layout: "diff"
  behavior: default
  require_changes: true

github_checks:
  annotations: true