coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%

    patch: false
  
  precision: 3

  comment:
    layout: "diff"
    behavior: default
    require_changes: true
  
  range: "50...100"
  round: down
  flag_management:
    default_rules:
      carryforward: true